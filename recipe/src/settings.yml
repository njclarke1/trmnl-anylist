strategy: polling
polling_verb: get
polling_url: "{{ api_url }}/api/v1/list?name={{ list_name }}"
polling_headers: "authorization: Bearer {{ api_token }}"
name: AnyList Shopping List
description: >
  Displays your AnyList shopping list on your TRMNL device. Shows unchecked
  items only, grouped by category. Requires a self-hosted trmnl-anylist-api
  sidecar — see the README for setup instructions.
refresh_interval: 900
framework_version: latest
custom_fields:
  - keyname: api_url
    field_type: string
    name: API URL
    description: "Base URL of your trmnl-anylist-api instance, e.g. http://192.168.68.111:3457"
    placeholder: "http://192.168.68.111:3457"
  - keyname: list_name
    field_type: string
    name: List Name
    description: "AnyList list name to display — must match exactly (case-sensitive)"
    placeholder: "Groceries"
  - keyname: api_token
    field_type: string
    name: API Token
    description: "Bearer token matching API_TOKEN in your sidecar .env — keep this secret"
